name: Build APK Lite F

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Pastikan folder platform Android ada
        run: flutter create --platforms=android --project-name=lite_f .

      - name: Ambil dependencies
        run: flutter pub get

      - name: Generate icon app dari logo
        run: dart run flutter_launcher_icons

      - name: Build APK (ukuran kecil, khusus arm64)
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload APK sebagai hasil build
        uses: actions/upload-artifact@v4
        with:
          name: lite-f-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
